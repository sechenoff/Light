name: Server fix pm2

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Reset errored pm2 services from ecosystem
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          command_timeout: 5m
          script: |
            set +e
            cd /opt/light-rental-system
            echo "=== BEFORE ==="; pm2 list
            echo "=== ecosystem api/rental-bot defs ==="
            grep -nE "name:|script:|cwd:|exec_mode|args:" ecosystem.config.js 2>/dev/null | head -40
            echo "=== delete errored api + rental-bot ==="
            pm2 delete api 2>/dev/null; pm2 delete rental-bot 2>/dev/null
            echo "=== start from ecosystem (only api, rental-bot) ==="
            pm2 start ecosystem.config.js --only api --update-env 2>&1 | tail -5
            pm2 start ecosystem.config.js --only rental-bot --update-env 2>&1 | tail -5
            pm2 save 2>&1 | tail -2
            sleep 10
            echo "=== AFTER ==="; pm2 list
            echo "=== api status ==="; pm2 describe api 2>/dev/null | grep -E "status|restart|uptime|script path|exec cwd|node env" | head -12
            echo "=== fresh api error log (tail 60) ==="
            tail -n 60 logs/api-error-4.log 2>/dev/null || (ls -t logs/ 2>/dev/null | head; for f in $(ls -t logs/api-error* 2>/dev/null | head -1); do echo "-- $f --"; tail -n 60 "$f"; done)
            echo "=== fresh api out log (tail 20) ==="
            tail -n 20 logs/api-out-4.log 2>/dev/null || true
            echo "=== local API health on server ==="
            sleep 3; curl -sS -m 8 -o /dev/null -w "localhost:4000/health -> %{http_code}\n" http://127.0.0.1:4000/health || echo "(curl failed)"
            curl -sS -m 8 -o /dev/null -w "localhost:4000/api/problem-items -> %{http_code}\n" http://127.0.0.1:4000/api/problem-items || echo "(curl failed)"
            echo "=== END ==="
