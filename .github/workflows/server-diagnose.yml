name: Server diagnose

on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Capture API crash diagnostics from server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          command_timeout: 5m
          script: |
            set +e
            cd /opt/light-rental-system
            echo "=== node / npm ==="; node -v; npm -v
            echo "=== deployed HEAD ==="; git rev-parse --short HEAD 2>/dev/null || echo "(no git)"
            echo "=== pm2 list ==="; pm2 list
            echo "=== pm2 describe api (tail) ==="; pm2 describe api 2>/dev/null | tail -30
            echo "=== pm2 logs api --err (last 80, nostream) ==="; pm2 logs api --err --lines 80 --nostream 2>/dev/null
            echo "=== pm2 logs api --out (last 30) ==="; pm2 logs api --out --lines 30 --nostream 2>/dev/null
            echo "=== api dist present? ==="; ls -la apps/api/dist 2>/dev/null | head -5; echo "---"; ls apps/api/dist/index.js 2>/dev/null || echo "NO dist/index.js"
            echo "=== try node load of built api (stderr) ==="; node -e "require('./apps/api/dist/index.js')" 2>&1 | head -25
            echo "=== prisma client + DB tables ==="
            node -e "const{PrismaClient}=require('@prisma/client');const p=new PrismaClient();p.\$queryRawUnsafe(\"SELECT name FROM sqlite_master WHERE type='table' AND name IN ('ProblemItem','RepairPhoto')\").then(r=>{console.log('tables:',JSON.stringify(r));return p.\$disconnect()}).catch(e=>{console.log('PRISMA ERR:',e.message);process.exit(0)})" 2>&1 | head -15
            echo "=== apps/api/.env keys (names only) ==="; ( [ -f apps/api/.env ] && grep -oE '^[A-Z_]+=' apps/api/.env | sort | tr '\n' ' ' ) || echo "NO apps/api/.env"; echo
            echo "=== free mem ==="; free -m 2>/dev/null | head -2
            echo "=== END DIAG ==="
