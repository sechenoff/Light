name: Admin — Unblock SSH (one-off)

on:
  workflow_dispatch:

jobs:
  unblock:
    runs-on: ubuntu-latest
    steps:
      - name: Remove stale iptables DROP rule for 193.233.252.49
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          command_timeout: 2m
          script: |
            echo "=== iptables INPUT before ==="
            iptables -L INPUT -n --line-numbers | head -20
            echo "=== removing DROP rules for 193.233.252.49 on dport 22 ==="
            while iptables -C INPUT -s 193.233.252.49 -p tcp --dport 22 -m conntrack --ctstate NEW -j DROP 2>/dev/null; do
              iptables -D INPUT -s 193.233.252.49 -p tcp --dport 22 -m conntrack --ctstate NEW -j DROP
              echo "removed one"
            done
            echo "=== iptables INPUT after ==="
            iptables -L INPUT -n --line-numbers | head -20
            echo "=== done ==="
